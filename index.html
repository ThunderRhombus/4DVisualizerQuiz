<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Axis Quiz Platform</title>
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.12.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.12.1/core.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #pygame-container {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .loading-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-text">Initializing 4D Physics Engine...</div>
    <div id="pygame-container"></div>

    <script type="py" config='{
        "packages": ["pygame-ce", "numpy"],
        "files": [
            "./Senior_Project/MAIN.py",
            "./Senior_Project/MAINWireframe.py",
            "./Senior_Project/MAINWShell.py",
            "./Senior_Project/MAINCellHl.py",
            "./Senior_Project/OriginRenderer.py",
            "./Senior_Project/ThreeAxis.py",
            "./Senior_Project/Tesseract.py",
            "./Senior_Project/FourShape.py",
            "./Senior_Project/Graph.py",
            "./Senior_Project/Cube.py",
            "./Senior_Project/Tetrahedron.py"
        ]
    }'>
import asyncio
import pygame

async def run_app():
    import MAIN
    from js import document
    document.getElementById("loading").style.display = "none"
    await MAIN.main_async()

asyncio.ensure_future(run_app())
    </script>
</body>
</html>
