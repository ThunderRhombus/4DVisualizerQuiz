<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Axis Quiz Platform (Web Port)</title>
    <!-- Use the specialized PyGame-CE Web port of PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #canvas {
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background-color: black;
            cursor: crosshair;
        }
        .ui-header {
            margin-bottom: 15px;
            text-align: center;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <div>Compiling 4D Geometry Engine...</div>
        <div style="font-size: 12px; color: #666; margin-top: 10px;">Initializing SDL2 Canvas via Pygame-CE</div>
    </div>

    <div class="ui-header">
        <h1 style="margin: 0; font-size: 24px; color: #00ffcc;">4D VISUALIZER QUIZ</h1>
        <p style="margin: 5px 0; color: #888; font-size: 14px;">Physics-accurate 4D Tesseract Rotation Mapping</p>
    </div>

    <!-- Error message display -->
    <div id="error-message" style="display: none; position: fixed; top: 60px; left: 20px; background: #1a0000; border: 2px solid #ff4444; padding: 15px; border-radius: 5px; max-width: 400px; max-height: 200px; overflow-y: auto; font-size: 12px; z-index: 1000;">
        <div style="color: #ffaa00; margin-bottom: 10px; font-weight: bold;">⚠️ Initialization Messages:</div>
    </div>

    <!-- Pygame-CE will automatically target this canvas ID -->
    <canvas id="canvas"></canvas>

    <script type="py" config='{
        "packages": ["pygame-ce", "numpy"],
        "files": [
            "./MAIN.py",
            "./MAINWireframe.py",
            "./MAINWShell.py",
            "./MAINCellHl.py",
            "./OriginRenderer.py",
            "./ThreeAxis.py",
            "./Tesseract.py",
            "./FourShape.py",
            "./Graph.py",
            "./Cube.py",
            "./Tetrahedron.py",
            "./Edge.py",
            "./Origin.py",
            "./patch.py"
        ]
    }'>
import asyncio
import pygame
import MAIN
from js import document, console
import os
import sys
import traceback

def log_error(msg):
    """Log error to browser console and UI"""
    console.error(f"[4D-ERROR] {msg}")
    error_div = document.getElementById("error-message")
    if error_div:
        error_div.innerHTML += f"<div style='color: #ff4444;'>{msg}</div>"

def log_info(msg):
    """Log info to browser console"""
    console.log(f"[4D-INFO] {msg}")

async def run_game():
    try:
        log_info("Starting 4D Visualizer initialization...")
        
        # Configure pygame-ce for web
        try:
            os.environ['SDL_VIDEODRIVER'] = 'emscripten'
            os.environ['SDL_VIDEO_WINDOW_POS'] = '0,0'
            log_info("SDL environment configured")
        except Exception as e:
            log_error(f"Failed to configure SDL environment: {e}")
        
        # Set canvas properties
        try:
            canvas = document.getElementById("canvas")
            if not canvas:
                raise Exception("Canvas element not found in DOM")
            canvas.width = 1200
            canvas.height = 800
            log_info("Canvas initialized: 1200x800")
        except Exception as e:
            log_error(f"Canvas setup failed: {e}")
            return
        
        # Hide loading overlay
        try:
            loading = document.getElementById("loading")
            if loading:
                loading.style.opacity = "0"
                await asyncio.sleep(0.3)
                loading.style.display = "none"
            log_info("Loading overlay hidden")
        except Exception as e:
            log_error(f"Failed to hide loading overlay: {e}")
        
        # Show error message container
        try:
            error_div = document.getElementById("error-message")
            if error_div:
                error_div.style.display = "block"
        except:
            pass
        
        # Run main game
        log_info("Launching main game loop...")
        await MAIN.main_async()
        
    except KeyboardInterrupt:
        log_info("Game interrupted by user")
    except Exception as e:
        error_msg = f"Critical Error: {str(e)}\n{traceback.format_exc()}"
        log_error(error_msg)
        print(error_msg, file=sys.stderr)

if __name__ == "__main__":
    asyncio.ensure_future(run_game())
    </script>
</body>
</html>
